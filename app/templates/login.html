<!DOCTYPE html>
<html lang="en">
<head>
    <title>Smart Face Attendance — Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0b0e1a;
            font-family: 'Outfit', sans-serif;
            color: #eef0f9;
            position: relative;
            overflow: hidden;
        }

        /* ── BACKGROUND ORBS ── */
        body::before {
            content: '';
            position: fixed;
            top: -120px; left: -80px;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(108,138,255,0.09) 0%, transparent 65%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -100px; right: -60px;
            width: 420px; height: 420px;
            background: radial-gradient(circle, rgba(74,222,128,0.06) 0%, transparent 65%);
            pointer-events: none;
        }

        /* ── GRID TEXTURE ── */
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(108,138,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(108,138,255,0.03) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
        }

        /* ── WRAPPER ── */
        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            padding: 20px;
            animation: fadeUp 0.5s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── BRAND HEADER ── */
        .login-brand {
            text-align: center;
            margin-bottom: 28px;
        }

        .brand-icon {
            width: 52px; height: 52px;
            background: linear-gradient(135deg, rgba(108,138,255,0.2), rgba(74,222,128,0.15));
            border: 1px solid rgba(108,138,255,0.3);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 14px;
            box-shadow: 0 8px 32px rgba(108,138,255,0.15);
        }

        .brand-icon svg {
            width: 26px; height: 26px;
            color: #a5b4ff;
        }

        .login-brand h1 {
            font-family: 'DM Serif Display', serif;
            font-size: 1.6rem;
            font-weight: 400;
            color: #eef0f9;
            letter-spacing: -0.01em;
            line-height: 1.2;
            margin-bottom: 6px;
        }

        .login-brand p {
            font-size: 0.82rem;
            color: #454d6a;
            font-family: 'DM Mono', monospace;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        /* ── CARD ── */
        .login-card {
            background: #111629;
            border: 1px solid rgba(108,138,255,0.15);
            border-radius: 18px;
            padding: 32px 30px;
            position: relative;
            overflow: hidden;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.03),
                0 24px 60px rgba(0,0,0,0.4);
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 10%; right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(108,138,255,0.5), transparent);
        }

        /* ── FORM HEADING ── */
        .form-heading {
            margin-bottom: 22px;
        }

        .form-heading h2 {
            font-family: 'DM Serif Display', serif;
            font-size: 1.25rem;
            font-weight: 400;
            color: #eef0f9;
            margin-bottom: 4px;
        }

        .form-heading p {
            font-size: 0.8rem;
            color: #454d6a;
        }

        /* ── ROLE SELECTOR ── */
        .role-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 18px;
        }

        .role-btn {
            background: #0e1220;
            border: 1px solid rgba(108,138,255,0.13);
            border-radius: 10px;
            padding: 10px 6px;
            text-align: center;
            cursor: pointer;
            transition: all 0.18s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .role-btn:hover {
            border-color: rgba(108,138,255,0.35);
            background: rgba(108,138,255,0.06);
        }

        .role-btn.selected {
            border-color: rgba(108,138,255,0.5);
            background: rgba(108,138,255,0.12);
        }

        .role-btn.selected.faculty  { border-color: rgba(108,138,255,0.5); background: rgba(108,138,255,0.12); }
        .role-btn.selected.student  { border-color: rgba(74,222,128,0.45); background: rgba(74,222,128,0.09); }
        .role-btn.selected.admin    { border-color: rgba(232,200,122,0.45); background: rgba(232,200,122,0.09); }

        .role-icon {
            font-size: 1.2rem;
            line-height: 1;
        }

        .role-label {
            font-size: 0.7rem;
            font-family: 'DM Mono', monospace;
            letter-spacing: 0.04em;
            color: #7b84a8;
            text-transform: uppercase;
        }

        .role-btn.selected .role-label { color: #eef0f9; }

        /* Hidden real select */
        #role-select {
            display: none;
        }

        /* ── FIELD GROUP ── */
        .field-group {
            margin-bottom: 14px;
        }

        .field-label {
            display: block;
            font-size: 0.7rem;
            font-family: 'DM Mono', monospace;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            color: #454d6a;
            margin-bottom: 6px;
        }

        .field-input {
            position: relative;
        }

        .field-input svg {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px; height: 16px;
            color: #454d6a;
            pointer-events: none;
        }

        /* Override style.css inputs */
        .login-card input {
            width: 100%;
            padding: 11px 14px 11px 38px;
            margin-top: 0;
            background: #0e1220;
            border: 1px solid rgba(108,138,255,0.14);
            border-radius: 10px;
            color: #eef0f9;
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .login-card input::placeholder { color: #454d6a; }

        .login-card input:focus {
            border-color: rgba(108,138,255,0.5);
            box-shadow: 0 0 0 3px rgba(108,138,255,0.12);
        }

        /* ── SUBMIT BTN ── */
        .login-card button[type="submit"] {
            width: 100%;
            padding: 12px;
            background: #6c8aff;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.03em;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 20px rgba(108,138,255,0.3);
            transition: all 0.2s ease;
        }

        .login-card button[type="submit"]:hover {
            background: #7f9dff;
            box-shadow: 0 6px 28px rgba(108,138,255,0.45);
            transform: translateY(-1px);
        }

        .login-card button[type="submit"]:active {
            transform: translateY(0);
        }

        /* ── LINKS ── */
        .login-links {
            margin-top: 18px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: center;
        }

        .login-links a {
            font-size: 0.82rem;
            color: #6c8aff;
            text-decoration: none;
            transition: color 0.15s;
        }

        .login-links a:hover { color: #a5b4ff; }

        .login-links .divider {
            color: #454d6a;
            font-size: 0.75rem;
        }

        .login-links .register-row {
            font-size: 0.82rem;
            color: #7b84a8;
        }

        /* ── ERROR ── */
        .login-card .error {
            background: rgba(248,113,113,0.08);
            color: #fca5a5;
            border-left: 3px solid #f87171;
            padding: 10px 14px;
            border-radius: 0 8px 8px 0;
            font-size: 0.85rem;
            margin-bottom: 16px;
        }

        /* ── FOOTER ── */
        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.72rem;
            font-family: 'DM Mono', monospace;
            color: #2a3050;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

<div class="bg-grid"></div>

<div class="login-wrapper">

    <!-- BRAND -->
    <div class="login-brand">
        <div class="brand-icon">
            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.6">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
        </div>
        <h1>Smart Face Attendance</h1>
        <p>CSE AIML · Attendance System</p>
    </div>

    <!-- CARD -->
    <div class="login-card">

        <div class="form-heading">
            <h2>Sign in to your account</h2>
            <p>Select your role and enter credentials below</p>
        </div>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">

            <!-- ROLE VISUAL SELECTOR -->
            <div class="role-selector" id="roleSelector">
                <div class="role-btn faculty" data-value="faculty" onclick="selectRole('faculty', this)">
                    <span class="role-icon">🎓</span>
                    <span class="role-label">Faculty</span>
                </div>
                <div class="role-btn student" data-value="student" onclick="selectRole('student', this)">
                    <span class="role-icon">📚</span>
                    <span class="role-label">Student</span>
                </div>
                <div class="role-btn admin" data-value="admin" onclick="selectRole('admin', this)">
                    <span class="role-icon">⚙️</span>
                    <span class="role-label">Admin</span>
                </div>
            </div>
            <select name="role" id="role-select" required>
                <option value="">Login as...</option>
                <option value="faculty">Faculty</option>
                <option value="student">Student</option>
                <option value="admin">Admin</option>
            </select>

            <!-- USERNAME -->
            <div class="field-group">
                <label class="field-label">Username</label>
                <div class="field-input">
                    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                    <input name="username" placeholder="Enter your username" required autocomplete="username">
                </div>
            </div>

            <!-- PASSWORD -->
            <div class="field-group">
                <label class="field-label">Password</label>
                <div class="field-input">
                    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                    </svg>
                    <input type="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
                </div>
            </div>

            <button type="submit">Sign In →</button>

        </form>

        <div class="login-links">
            <a href="/forgot_password">Forgot password?</a>
            <div class="register-row">
                Don't have an account? <a href="/register">Register here</a>
            </div>
        </div>

    </div>

    <div class="login-footer">SMART FACE ATTENDANCE &nbsp;·&nbsp; CSE AIML</div>

</div>

<script>
    function selectRole(value, el) {
        // Update visual buttons
        document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('selected'));
        el.classList.add('selected');
        // Sync hidden select
        document.getElementById('role-select').value = value;
    }

    // If form is re-submitted with a role pre-selected (e.g. error state), restore visual
    window.addEventListener('DOMContentLoaded', () => {
        const sel = document.getElementById('role-select').value;
        if (sel) {
            const btn = document.querySelector(`.role-btn[data-value="${sel}"]`);
            if (btn) btn.classList.add('selected');
        }
    });
</script>

</body>
</html>
