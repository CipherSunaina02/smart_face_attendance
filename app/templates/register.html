<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="navbar">SMART FACE ATTENDANCE</div>

<div class="container">
    <div class="card" style="max-width:500px;margin:auto;">
        <h2>Create Account</h2>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        {% if message %}
            <div class="success">{{ message }}</div>
        {% endif %}

        <form method="POST">
            <input name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <select name="role" required>
                <option value="">Select role</option>
                <option value="admin">Admin</option>
                <option value="faculty">Faculty</option>
                <option value="student">Student</option>
            </select>
            <div id="student-details" style="display:none;">
                <input name="name" placeholder="Student Name">
                <input name="roll" placeholder="Student Roll Number">
            </div>
            <div id="faculty-details" style="display:none;">
                <input name="name" placeholder="Faculty Name">
                <input name="department" placeholder="Department (e.g. CSE AIML)" value="CSE AIML">
            </div>
            <button type="submit">Register</button>
        </form>
        <p style="margin-top:10px; font-size:0.95rem;">Already registered? <a href="/">Login</a></p>
    </div>
</div>

<script>
const roleSelect = document.querySelector('select[name="role"]');
const studentDetails = document.getElementById('student-details');
roleSelect?.addEventListener('change', function() {
  studentDetails.style.display = this.value === 'student' ? 'block' : 'none';
  document.getElementById('faculty-details').style.display = this.value === 'faculty' ? 'block' : 'none';
});
</script>

</body>
</html>
